services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cvmatch-backend
    ports:
      - "8000:8000"
    environment:
      # Read from the host's environment or from a .env file at repo root.
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ALLOWED_ORIGINS: "http://localhost:3000"
    restart: unless-stopped
    # Note: the SQLite embedding cache (vectors.db) lives inside the container
    # and is wiped when the container is recreated. First match after each
    # rebuild re-embeds the CV; subsequent matches are fast. Add a volume mount
    # here later if you want persistence across rebuilds.

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* vars are baked into the client bundle at build time.
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        NEXT_PUBLIC_BACKEND_URL: "http://localhost:8000"
    container_name: cvmatch-frontend
    ports:
      - "3000:3000"
    environment:
      # Clerk server-side secret — runtime only, never baked into the image.
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
    depends_on:
      - backend
    restart: unless-stopped
